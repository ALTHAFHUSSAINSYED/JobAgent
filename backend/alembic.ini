# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# prepend the current directory to sys.path
prepend_sys_path = .

# default database URL
sqlalchemy.url = postgresql+asyncpg://jobpilot_user:jobpilot_secure_password@localhost:5432/jobpilot_db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
