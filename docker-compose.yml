version: '3.8'

networks:
  jobpilot_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:
  postgres:
    image: postgres:17-alpine
    container_name: jobpilot_postgres
    restart: always
    environment:
      POSTGRES_DB: jobpilot_db
      POSTGRES_USER: jobpilot_user
      POSTGRES_PASSWORD: jobpilot_secure_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - jobpilot_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobpilot_user -d jobpilot_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jobpilot_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - jobpilot_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: jobpilot_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@jobpilot.local
      PGADMIN_DEFAULT_PASSWORD: admin_secure_password
    ports:
      - "5050:80"
    networks:
      - jobpilot_net
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobpilot_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://jobpilot_user:jobpilot_secure_password@postgres:5432/jobpilot_db
      - REDIS_URL=redis://redis:6379/0
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ENV=production
    volumes:
      - ./config:/app/config
      - ./resumes:/app/resumes
      - ./logs:/app/logs
    networks:
      - jobpilot_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jobpilot_frontend
    restart: always
    ports:
      - "3000:3000"
    networks:
      - jobpilot_net
    depends_on:
      backend:
        condition: service_healthy
